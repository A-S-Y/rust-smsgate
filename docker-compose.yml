services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smsgate
      POSTGRES_USER: smsgate
      POSTGRES_PASSWORD: smsgate
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smsgate -d smsgate"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
